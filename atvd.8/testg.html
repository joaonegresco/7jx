<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <title>jx7</title>

    <style>
        body {
            background-image: url("background.gif");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .personagem {
            width: 380px;
            height: 350px;
            object-fit: cover;
        }

        .cards {
            gap: 30px;
        }

        progress {
            width: 120px;
        }
    </style>
</head>

<body>

    <div class="container py-5">

        <div class="card bg-dark text-white">

                By joao

            <div class="card-body" style="background-image: url('background.gif'); background-size: cover; background-position: center;">

                <!-- CARDS -->
                <div class="d-flex justify-content-center cards">

                    <!-- PERSONAGEM 1 -->
                    <ul class="list-group" style="width: 225px;">
                        <li class="list-group-item">Jxx7</li>
                        <li class="list-group-item">Rei</li>

                        <li class="list-group-item">
                            ❤️
                            <progress value="100" max="100"
                                style="accent-color: rgb(180,2,2);"></progress>
                        </li>

                        <li class="list-group-item">
                            🧪
                            <progress value="100" max="100"
                                style="accent-color: rgb(3,167,17);"></progress>
                        </li>

                        <li class="list-group-item">
                            💙

                        </li>

                        <li class="list-group-item">
                            🧪
                            <progress value="100" max="100"
                                style="accent-color: rgb(3,167,17);"></progress>
                        </li>

                        <li class="list-group-item">
                            💙
                            <progress value="100" max="100"
                                style="accent-color: rgb(1,16,153);"></progress>
                        </li>
                    </ul>

                </div>

                <!-- IMAGENS -->
                <div class="d-flex justify-content-center">
                    <img src="vnm.gif" class="personagem"; style="width: 400px; height: 400px;">
                    <img src="vnm2.gif" class="personagem"; style="width: 400px; height: 400px;"> 
                </div>

            </div>

            <div class="card-footer text-center">
                
            </div>
        </div>

    </div>

</body>

</html>
